services:
  db:
    image: postgres:15-alpine
    container_name: lifeos_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos} -d ${POSTGRES_DB:-lifeos}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mqtt:
    build:
      context: .
      dockerfile: mqtt.Dockerfile
    container_name: lifeos_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lifeos_server
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    environment:
      PORT: "3090"
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      MQTT_URL: "mqtt://mqtt:1883"
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "3090:3090"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lifeos_client
    depends_on:
      - server
    ports:
      - "8084:80"
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
