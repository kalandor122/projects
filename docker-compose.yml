version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_project_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: task_project_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: task_project_server
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: task_project_client
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: always

volumes:
  postgres_data:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
