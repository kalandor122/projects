services:
  db:
    image: postgres:15-alpine
    container_name: task_project_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    build:
      context: .
      dockerfile: mqtt.Dockerfile
    container_name: task_project_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: task_project_server
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    environment:
      PORT: "3001"
      MQTT_URL: "mqtt://mqtt:1883"
    ports:
      - "3001:3001"
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: task_project_client
    depends_on:
      - server
    ports:
      - "8084:80"
    restart: always

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
